<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guidorizzi — Cálculo I</title>
  <meta name="description" content="Plataforma de estudos de Cálculo baseada no livro do Hamilton Guidorizzi" />
  <meta name="theme-color" content="#050505" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cálculo I" />
  <script>
    window.addEventListener('error', function (e) {
      var stack = e.error ? e.error.stack : e.message;
      document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#ef4444;color:white;z-index:999999;padding:2rem;font-family:monospace;overflow:auto;word-wrap:break-word;"><h2>🚨 CRASH FRONTEND</h2><pre>' + stack + '</pre></div>';
    });
    window.addEventListener('unhandledrejection', function (e) {
      var reason = e.reason ? (e.reason.stack || e.reason) : 'Unknown promise rejection';
      document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#f97316;color:white;z-index:999999;padding:2rem;font-family:monospace;overflow:auto;word-wrap:break-word;"><h2>⚠️ PROMISE REJECTION</h2><pre>' + reason + '</pre></div>';
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
