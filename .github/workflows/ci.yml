name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================================
  # Lint, Type Check, Test, Build on Node 18.x and 20.x
  # ============================================================================
  lint-test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        
      - name: TypeScript type check
        run: npx tsc --noEmit
        
      - name: Run tests with coverage
        run: npm run test:coverage
        
      - name: Check coverage thresholds
        run: |
          echo "✅ Coverage thresholds enforced (60% min)"
          
      - name: Build for production
        run: npm run build
        
      - name: Check bundle size
        run: |
          echo "📦 Build artifacts:"
          du -sh dist/ || echo "Build folder not found"

  # ============================================================================
  # Upload coverage to Codecov (on main branch, Node 20.x only)
  # ============================================================================
  coverage:
    needs: lint-test-build
    runs-on: ubuntu-latest
    if: matrix.node-version == '20.x' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests with coverage
        run: npm run test:coverage
        
      - name: Upload to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  # ============================================================================
  # Deploy to Render (main branch only, after tests pass)
  # ============================================================================
  deploy:
    needs: lint-test-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Trigger Render deployment
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "⚠️  RENDER_API_KEY not configured in GitHub secrets"
            echo "To deploy, add your Render API key to GitHub secrets"
          else
            curl -X POST \
              "https://api.render.com/deploy/$RENDER_SERVICE_ID?key=$RENDER_API_KEY" \
              || echo "Deploy trigger failed (optional)"
          fi